name: Tests

# 注意:用 "on" 而不是 on 避免 PyYAML 解析为 boolean True
"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 取消正在跑的同 workflow(节省 CI 资源)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 用 --no-cache-dir 避免缓存冲突,失败继续往下走(fast-fail)
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir pytest pytest-cov

      - name: Run tests (offline mode, no real Ollama)
        env:
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: |
          python -m pytest tests/ -v --tb=short --durations=10

      - name: Run e2e CLI in --no-llm mode
        env:
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: |
          python stage8_e2e_demo.py --no-llm --query "test CI" || true
          # demo 的日志写到 stage8_e2e_log.txt,只检查退出码非 0 才报错
          if [ -f stage8_e2e_log.txt ]; then echo "✅ log written"; fi

      - name: Upload coverage report (optional)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
        run: |
          python -m pytest tests/ --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}