[pytest]
# 默认选项 — CI 和本地一致
addopts = -ra --strict-markers --tb=short
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记(以后想跑 subset 用 -m)
markers =
    slow: 慢测试(默认跳过,需要 --runslow 显式启用)
    network: 需要联网的测试(默认跳过)

# 注意:HF_HUB_OFFLINE / TRANSFORMERS_OFFLINE 这两个环境变量
#       请在运行 pytest 前手动设置(CI workflow 里已经设了)
#       本地命令:
#         $env:HF_HUB_OFFLINE="1"; $env:TRANSFORMERS_OFFLINE="1"; pytest