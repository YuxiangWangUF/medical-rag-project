[pytest]
# 默认选项 — CI 和本地一致
addopts = -ra --strict-markers --tb=short
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记(以后想跑 subset 用 -m)
markers =
    slow: 慢测试(默认跳过,需要 --runslow 显式启用)
    network: 需要联网的测试(默认跳过)

# 跳过 deprecated 模块的测试
# retrieval_pipeline.py 已被 stage6_retrieval_pipeline.py 取代(README 第 213 行 + 文件头均标注 DEPRECATED)
# 测的是已知有 bug 的旧实现(P0-5:min-max 归一化 BGE-reranker logits 丢绝对信号)
# 保留只为"万一有人引用",不参与 CI
collect_ignore_glob =
    tests/test_retrieval_pipeline.py

# 注意:HF_HUB_OFFLINE / TRANSFORMERS_OFFLINE 这两个环境变量
#       请在运行 pytest 前手动设置(CI workflow 里已经设了)
#       本地命令:
#         $env:HF_HUB_OFFLINE="1"; $env:TRANSFORMERS_OFFLINE="1"; pytest